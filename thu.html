<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Jueves</title>




    <style>
        /* Nav superior */
        .wrapper {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 40px;
            padding: 10px 0 6px 0;
            background-color: antiquewhite;
        }
        #backButton {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        #backButton a {
            color: #551A8B;
            text-decoration: underline;
            font-family: 'Segoe UI', sans-serif;
            font-size: 16px;
            font-weight: bold;
        }
        /* Header parasha compacto */
        .wrapperHeader { padding: 4px 0 2px 0; text-align: center; }
        #bookHeader p { margin: 2px 0; line-height: 1.3; }
        /* Botones de idioma */
        #langBar {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 8px 0 6px 0;
            background-color: antiquewhite;
        }
        .langBtn {
            font-family: 'Times New Roman', serif;
            font-size: 16px;
            font-weight: bold;
            width: 56px;
            height: 36px;
            border: 1.5px solid #999;
            border-radius: 6px;
            background-color: white;
            cursor: pointer;
        }
        .langBtn.active {
            background-color: #720026;
            color: white;
            border-color: #720026;
        }
        /* Ocultar paneles */
        div.wrap.hide { display: none !important; }
    </style>
                                <script>
        function setLang(mode) {
            var src = document.querySelector('.splitScreen');
            var tgt = document.querySelector('.splitScreen2');

            if (mode === 'he') {
                if (src) { src.style.height = '86vh'; src.style.minHeight = '86vh'; src.style.overflow = 'scroll'; }
                if (tgt) { tgt.style.height = '0px'; tgt.style.minHeight = '0px'; tgt.style.overflow = 'hidden'; tgt.style.padding = '0'; tgt.style.margin = '0'; }
            } else if (mode === 'es') {
                if (src) { src.style.height = '0px'; src.style.minHeight = '0px'; src.style.overflow = 'hidden'; src.style.padding = '0'; src.style.margin = '0'; }
                if (tgt) { tgt.style.height = '86vh'; tgt.style.minHeight = '86vh'; tgt.style.overflow = 'scroll'; }
            } else {
                if (src) { src.style.height = '49vh'; src.style.minHeight = ''; src.style.overflow = 'scroll'; src.style.padding = ''; src.style.margin = ''; }
                if (tgt) { tgt.style.height = '49vh'; tgt.style.minHeight = ''; tgt.style.overflow = 'scroll'; tgt.style.padding = ''; tgt.style.margin = ''; }
            }

            var btns = document.querySelectorAll('.langBtn');
            for (var j = 0; j < btns.length; j++) { btns[j].classList.remove('active'); }
            var btn = document.getElementById('btn-' + mode);
            if (btn) btn.classList.add('active');
            try { localStorage.setItem('jokLang', mode); } catch(e) {}
        }

        window.addEventListener('DOMContentLoaded', function() {
            var saved = 'both';
            try { saved = localStorage.getItem('jokLang') || 'both'; } catch(e) {}
            setLang(saved);
        });
    </script>
</head>

<body>

    <div class="wrapper">

        <ul>
            <div>

            <li class="linkBoxChild"><a class="linkBox" id="juevesNoche" href="#">jueves por la noche</a></li>
            <script src="thu.js"></script>
        </ul>

    </div>



</body>

</html>
